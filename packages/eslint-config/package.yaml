name: '@nuxt-monorepo-template/eslint-config'
type: module
private: true
license: MIT

description: Base ESLint config for nuxt-monorepo-template

exports:
  .:
    types: ./src/index.ts
    import: ./src/index.ts
    default: ./src/index.ts

main: ./src/index.ts
types: ./src/index.ts
module: ./src/index.ts

scripts:
  postinstall: pnpm generate:ruleTypeDefinitions

  generate:ruleTypeDefinitions: jiti scripts/generate-rule-type-definitions.ts

  typecheck: tsc

  dev: tsdown --watch

  # Specify host to allow the config inspector page to be accessible over WSL port forwarding
  inspect: eslint-config-inspector --host 0.0.0.0

  prebuild: pnpm generate:ruleTypeDefinitions
  build: tsdown
  prepack: pnpm build

  lint: pnpm lint:es
  lint:es:  eslint --max-warnings 0

  test: pnpm test:unit
  test:watch: pnpm test:unit:watch
  test:unit: vitest run
  test:unit:watch: vitest

peerDependencies:
  eslint: catalog:eslint

dependencies:
  defu: catalog:eslint-config

  globals: catalog:eslint
  '@eslint/core': catalog:eslint

  '@eslint/js': catalog:eslint
  '@nuxt/eslint-plugin': catalog:eslint
  '@stylistic/eslint-plugin': catalog:eslint
  eslint-config-flat-gitignore: catalog:eslint
  eslint-plugin-unicorn: catalog:eslint
  '@vitest/eslint-plugin': catalog:eslint
  eslint-plugin-playwright: catalog:eslint
  eslint-plugin-testing-library: catalog:eslint
  eslint-plugin-import-x: catalog:eslint

  '@typescript-eslint/eslint-plugin': catalog:eslint
  '@typescript-eslint/parser': catalog:eslint

  eslint-plugin-vue-pug: catalog:eslint
  '@eslint/eslintrc': catalog:eslint

  eslint-plugin-vue: catalog:eslint
  vue-eslint-parser: catalog:eslint
  eslint-processor-vue-blocks: catalog:eslint
  eslint-plugin-vuejs-accessibility: catalog:eslint

  eslint-flat-config-utils: catalog:eslint

  ts-pattern: catalog:typescript

devDependencies:
  '@nuxt-monorepo-template/tsconfig': workspace:*

  tsdown: catalog:package-tools

  eslint-typegen: catalog:eslint
  '@eslint/config-inspector': catalog:eslint
  '@nuxt/eslint-config': catalog:eslint

  typescript: catalog:typescript
  jiti: catalog:typescript

  vitest: catalog:testing
  vite-tsconfig-paths: catalog:testing
