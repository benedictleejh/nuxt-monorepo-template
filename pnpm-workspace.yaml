packages:
  - apps/*
  - packages/*

minimumReleaseAge: 10080

trustPolicy: no-downgrade

catalogMode: strict

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  sharp: false
  unrs-resolver: false

overrides:
  # Remove any reference to @types/eslint due to conflict with ESLint's inbuilt types
  '@types/eslint': '-'

  chokidar: 5.0.0
  semver: 7.7.3

# All depdencencies managed through catalogs to simplify management
# Exact version pins are used instead of ranges for security
catalogs:
  # Common catalogs to keep consistent dependency versions across apps and packages
  vue:
    vue: 3.5.26
    vue-router: 4.6.4
    vue-tsc: &vue-tools 3.2.1
    '@vue/test-utils': 2.4.6

    # To use Pug in Vue templates
    '@vue/language-plugin-pug': *vue-tools # Enables autocompletion for Vue components in Pug templates
    pug: 3.0.3

  nuxt:
    nuxt: 4.2.2
    '@nuxt/eslint': &nuxt-eslint 1.12.1
    '@nuxt/fonts': 0.12.1
    '@nuxt/image': 2.0.0
    '@nuxt/test-utils': 3.21.0
    '@nuxtjs/stylelint-module': 5.2.1
    '@benedictleejh/nuxt-sanitise-html': 1.1.0

  eslint:
    eslint: &eslint 9.39.2
    '@eslint/core': 0.17.0
    globals: 16.5.0
    eslint-typegen: 2.3.0

    '@eslint/js': *eslint
    '@nuxt/eslint-plugin': *nuxt-eslint
    '@nuxt/eslint-config': *nuxt-eslint
    '@stylistic/eslint-plugin': 5.6.1
    eslint-config-flat-gitignore: 2.1.0
    eslint-plugin-unicorn: 62.0.0
    '@vitest/eslint-plugin': 1.6.4 # ESLint rules for Vitest
    eslint-plugin-playwright: 2.4.0 # ESLint rules for Playwright
    eslint-plugin-testing-library: 7.15.3 # ESLint rules for Testing Library
    eslint-plugin-import-x: 4.16.1

    '@typescript-eslint/eslint-plugin': &typescript-eslint 8.50.1
    '@typescript-eslint/parser': *typescript-eslint

    eslint-plugin-vue-pug: 0.6.2 # ESLint rules for Pug
    '@eslint/eslintrc': 3.3.3 # To convert eslint-plugin-vue-pug to new ESLint flat config format

    eslint-plugin-vue: 10.6.2
    vue-eslint-parser: 10.2.0
    eslint-processor-vue-blocks: 2.0.0
    eslint-plugin-vuejs-accessibility: 2.4.1

    eslint-flat-config-utils: 2.1.4
    '@eslint/config-inspector': 1.4.2

  stylelint:
    # For linting stylesheets
    stylelint: 16.26.1
    stylelint-define-config: 16.26.0
    '@stylelint-types/stylelint-scss': 6.11.0
    '@stylelint-types/stylelint-stylistic': 3.1.3
    stylelint-config-standard-scss: 16.0.0
    stylelint-config-standard-vue: 1.0.0
    '@stylistic/stylelint-config': 3.0.1
    # Use SugarSS as a pseudo-sass parser due to postcss-sass not working with media queries
    postcss-sass: npm:sugarss@5.0.1
    postcss-html: 1.8.0

  testing:
    '@testing-library/vue': 8.1.0
    jsdom: 27.3.0
    vitest: 3.2.4
    vite-tsconfig-paths: 6.0.3 # For using tsconfig aliases in tests

    '@playwright/test': 1.57.0
    std-env: 3.10.0
    monocart-reporter: 2.9.23

  typescript:
    typescript: 5.9.3

    # Enable use of TypeScript config files in various tools
    jiti: 2.6.1

    '@types/node': 24.10.4 # Allow typechecking of node code as well

    ts-pattern: 5.9.0 # For pattern matching

  sass:
    sass-embedded: 1.97.1

  commit-checks:
    # For code quality checks on pre-commit
    husky: 9.1.7
    lint-staged: 16.2.7

  package-tools:
    tsdown: 0.18.3

  scripts:
    yaml: 2.8.2
    glob: 10.5.0
    '@pnpm/workspace.read-manifest': 1000.2.9


  # App/package-specific dependencies
  nuxt-app: {}

  eslint-config:
    defu: 6.1.4
