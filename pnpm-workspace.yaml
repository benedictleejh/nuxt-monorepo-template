packages:
  - apps/*
  - packages/*

overrides:
  # Remove any reference to @types/eslint due to conflict with ESLint's inbuilt types
  # TODO [webpack>eslint-scope@>=9.1.2]: Remove this override after webpack updates its eslint-scope dependency
  '@types/eslint': '-'

  # TODO [@nuxt/eslint>@eslint/config-inspector@>=2.0.0]: Remove when @nuxt/eslint upgrades the config inspector
  '@nuxt/eslint>@eslint/config-inspector': catalog:eslint

  # TODO: Remove when the relevant modules upgrade
  '@nuxtjs/stylelint-module>chokidar': &chokidar 5.0.0
  'sass>chokidar': *chokidar
  'vite-plugin-checker>chokidar': *chokidar

  # TODO [@vitejs/plugin-vue-jsx>@babel/*@>=8.0.0]: Remove when @vitejs/plugin-vue-jsx updates to Babel 8
  '@babel/core>semver': &semver 7.7.4
  '@babel/helper-create-class-features-plugin>semver': *semver
  '@babel/helper-compilation-targets>semver': *semver

minimumReleaseAge: 10080

trustPolicy: no-downgrade

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  sharp: false
  unrs-resolver: false

catalogMode: strict

patchedDependencies:
  eslint-plugin-vue-pug: patches/eslint-plugin-vue-pug.patch

# All depdencencies managed through catalogs to simplify management
# Exact version pins are used instead of ranges for security
catalogs:
  # Common catalogs to keep consistent dependency versions across apps and packages
  vue:
    vue: 3.5.34
    vue-router: 5.0.7
    vue-tsc: &vue-tools 3.3.1
    '@vue/test-utils': 2.4.10

    # To use Pug in Vue templates
    '@vue/language-plugin-pug': *vue-tools # Enables autocompletion for Vue components in Pug templates
    pug: 3.0.4

  nuxt:
    nuxt: 4.4.6
    '@nuxt/eslint': &nuxt-eslint 1.15.2
    '@nuxt/fonts': 0.14.0
    '@nuxt/image': 2.0.0
    '@nuxt/test-utils': 4.0.3
    '@nuxtjs/stylelint-module': 5.2.1
    '@benedictleejh/nuxt-sanitise-html': 1.1.3

  eslint:
    eslint: 10.4.0
    '@eslint/core': 1.2.1
    globals: 17.6.0
    eslint-typegen: 2.3.1

    '@eslint/js': 10.0.1
    '@nuxt/eslint-plugin': *nuxt-eslint
    '@nuxt/eslint-config': *nuxt-eslint
    '@stylistic/eslint-plugin': 5.10.0
    eslint-config-flat-gitignore: 2.3.0
    eslint-plugin-unicorn: 64.0.0
    '@vitest/eslint-plugin': 1.6.17 # ESLint rules for Vitest
    eslint-plugin-playwright: 2.10.4 # ESLint rules for Playwright
    eslint-plugin-testing-library: 7.16.2 # ESLint rules for Testing Library
    eslint-plugin-import-x: 4.16.2
    eslint-plugin-vue-pug: 1.0.0-alpha.5 # ESLint rules for Pug

    '@typescript-eslint/eslint-plugin': &typescript-eslint 8.59.4
    '@typescript-eslint/parser': *typescript-eslint

    eslint-plugin-vue: 10.9.1
    vue-eslint-parser: 10.4.0
    eslint-processor-vue-blocks: 2.0.0
    eslint-plugin-vuejs-accessibility: 2.5.0

    eslint-flat-config-utils: 3.2.0
    '@eslint/config-inspector': 3.0.2

  stylelint:
    # For linting stylesheets
    stylelint: 17.12.0
    stylelint-define-config: 17.11.0
    '@stylelint-types/stylelint-scss': 7.0.1
    '@stylelint-types/stylelint-stylistic': 5.1.0
    stylelint-config-standard-scss: 17.0.0
    stylelint-config-standard-vue: 1.0.0
    '@stylistic/stylelint-config': 5.0.0
    # Use SugarSS as a pseudo-sass parser due to postcss-sass not working with media queries
    postcss-sass: npm:sugarss@5.0.1
    postcss-html: 1.8.1
    stylelint-config-inspector: 2.3.0

  testing:
    '@testing-library/vue': 8.1.0
    jsdom: 29.1.1
    vitest: 4.1.7
    vite-tsconfig-paths: 6.1.1 # For using tsconfig aliases in tests

    '@playwright/test': 1.60.0
    std-env: 4.1.0
    monocart-reporter: 2.11.2

  typescript:
    typescript: 6.0.3

    # Better typed versions of built-in functions and other utilities
    ts-extras: 1.0.0

    # Type utilities
    type-fest: 5.6.0

    # Enable use of TypeScript config files in various tools
    jiti: 2.7.0

    '@types/node': 24.12.4 # Allow typechecking of node code as well

    ts-pattern: 5.9.0 # For pattern matching

  sass:
    sass-embedded: 1.100.0

  commit-checks:
    # For code quality checks on pre-commit
    husky: 9.1.7
    lint-staged: 17.0.5

  package-tools:
    tsdown: 0.22.0

  scripts:
    '@pnpm/workspace.projects-reader': 1101.0.6


  # App/package-specific dependencies
  nuxt-app: {}

  eslint-config:
    defu: 6.1.7
