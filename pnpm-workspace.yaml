pnpmfile: pnpmfile.ts

packages:
  - apps/*
  - packages/*

minimumReleaseAge: 10080

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@pnpm/types@1101.0.0'
  - '@pnpm/core-loggers@1100.0.1'

catalogMode: strict

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  sharp: false
  unrs-resolver: false

patchedDependencies:
  eslint-plugin-vue-pug: patches/eslint-plugin-vue-pug.patch

overrides:
  # Remove any reference to @types/eslint due to conflict with ESLint's inbuilt types
  '@types/eslint': '-'

  chokidar: 5.0.0
  semver: 7.7.3

# All depdencencies managed through catalogs to simplify management
# Exact version pins are used instead of ranges for security
catalogs:
  # Common catalogs to keep consistent dependency versions across apps and packages
  vue:
    vue: 3.5.33
    vue-router: 5.0.6
    vue-tsc: &vue-tools 3.2.7
    '@vue/test-utils': 2.4.8

    # To use Pug in Vue templates
    '@vue/language-plugin-pug': *vue-tools # Enables autocompletion for Vue components in Pug templates
    pug: 3.0.4

  nuxt:
    nuxt: 4.4.2
    '@nuxt/eslint': &nuxt-eslint 1.15.2
    '@nuxt/fonts': 0.14.0
    '@nuxt/image': 2.0.0
    '@nuxt/test-utils': 4.0.2
    '@nuxtjs/stylelint-module': 5.2.1
    '@benedictleejh/nuxt-sanitise-html': 1.1.3

  eslint:
    eslint: 10.2.1
    '@eslint/core': 1.2.1
    globals: 17.5.0
    eslint-typegen: 2.3.1

    '@eslint/js': 10.0.1
    '@nuxt/eslint-plugin': *nuxt-eslint
    '@nuxt/eslint-config': *nuxt-eslint
    '@stylistic/eslint-plugin': 5.10.0
    eslint-config-flat-gitignore: 2.3.0
    eslint-plugin-unicorn: 64.0.0
    '@vitest/eslint-plugin': 1.6.16 # ESLint rules for Vitest
    eslint-plugin-playwright: 2.10.2 # ESLint rules for Playwright
    eslint-plugin-testing-library: 7.16.2 # ESLint rules for Testing Library
    eslint-plugin-import-x: 4.16.2
    eslint-plugin-vue-pug: 1.0.0-alpha.5 # ESLint rules for Pug

    '@typescript-eslint/eslint-plugin': &typescript-eslint 8.59.0
    '@typescript-eslint/parser': *typescript-eslint

    eslint-plugin-vue: 10.9.0
    vue-eslint-parser: 10.4.0
    eslint-processor-vue-blocks: 2.0.0
    eslint-plugin-vuejs-accessibility: 2.5.0

    eslint-flat-config-utils: 3.1.0
    '@eslint/config-inspector': 2.0.0

  stylelint:
    # For linting stylesheets
    stylelint: 17.9.0
    stylelint-define-config: 17.8.0
    '@stylelint-types/stylelint-scss': 7.0.0
    '@stylelint-types/stylelint-stylistic': 5.0.0
    stylelint-config-standard-scss: 17.0.0
    stylelint-config-standard-vue: 1.0.0
    '@stylistic/stylelint-config': 5.0.0
    # Use SugarSS as a pseudo-sass parser due to postcss-sass not working with media queries
    postcss-sass: npm:sugarss@5.0.1
    postcss-html: 1.8.1
    stylelint-config-inspector: 2.1.2

  testing:
    '@testing-library/vue': 8.1.0
    jsdom: 29.0.2
    vitest: 4.1.5
    vite-tsconfig-paths: 6.0.3 # For using tsconfig aliases in tests

    '@playwright/test': 1.59.1
    std-env: 4.1.0
    monocart-reporter: 2.10.1

  typescript:
    typescript: 5.9.3

    # Better typed versions of built-in functions and other utilities
    ts-extras: 1.0.0

    # Type utilities
    type-fest: 5.6.0

    # Enable use of TypeScript config files in various tools
    jiti: 2.6.1

    '@types/node': 24.12.2 # Allow typechecking of node code as well

    ts-pattern: 5.9.0 # For pattern matching

  sass:
    sass-embedded: 1.99.0

  commit-checks:
    # For code quality checks on pre-commit
    husky: 9.1.7
    lint-staged: 16.4.0

  package-tools:
    tsdown: 0.21.10

  scripts:
    yaml: 2.8.3
    '@pnpm/workspace.projects-reader': 1101.0.2


  # App/package-specific dependencies
  nuxt-app: {}

  eslint-config:
    defu: 6.1.7
